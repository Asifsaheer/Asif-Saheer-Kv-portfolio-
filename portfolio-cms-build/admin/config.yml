# DecapBridge PKCE auth
backend:
  name: git-gateway
  repo: Asifsaheer/Asif-Saheer-Kv-portfolio-
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/12b3bd2c-b895-4541-b89f-e880882fe004/pkce
  auth_token_endpoint: /sites/12b3bd2c-b895-4541-b89f-e880882fe004/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://asifsaheerkv.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"
media_library:
  name: default

collections:
  - name: "site"
    label: "Site Content"
    files:
      - name: "main"
        label: "Homepage Content"
        file: "content/site.json"
        preview_path: ""
        fields:
          - { label: "Profile Photo", name: "profile_photo", widget: "image", required: false }
          - { label: "Hero Subtitle", name: "lead_paragraph", widget: "text" }
          - { label: "About — Paragraph 1", name: "about_paragraph_1", widget: "text" }
          - { label: "About — Paragraph 2", name: "about_paragraph_2", widget: "text" }
          - { label: "About — Paragraph 3", name: "about_paragraph_3", widget: "text" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Contact Phone / WhatsApp", name: "contact_phone", widget: "string" }
          - { label: "LinkedIn", name: "contact_linkedin", widget: "string" }
          - { label: "GitHub", name: "contact_github", widget: "string" }
          - { label: "Resume Link (URL)", name: "resume_link", widget: "string" }
